server {
    listen 80;
    server_name _;

    # React-appen (SPA — alle ukjente ruter sendes til index.html)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api til FastAPI-backend (fjerner /api-prefikset)
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Viktig for streaming (SSE) — slår av buffering
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # Proxy /uploads til FastAPI (for klikkbare dokumentlenker)
    location /uploads/ {
        proxy_pass         http://backend:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
